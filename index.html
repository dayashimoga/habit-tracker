<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Habit Tracker — Build Better Habits | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Habit Tracker \u2014 Build Better Habits",
    "url": "https://habits.quickutils.top/",
    "description": "Free local habit tracker. Track daily habits, view heatmap progress, and build streaks. 100% private and stored locally in your browser.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://habits.quickutils.top/">
    <meta name="keywords" content="QuickUtils, habit, tracker, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <meta property="og:url" content="https://quickutils.top/habit-tracker/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Free local habit tracker. Track daily habits, view heatmap progress, and build streaks. 100% private and stored locally in your browser.">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <meta property="og:title" content="Daily Habit Tracker">
    <meta property="og:description" content="Build better habits with streak tracking and heatmaps.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5193703345853377" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HABITS00001"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-HABITS00001');</script>
    <meta name="theme-color" content="#ffffff">
</head>
<body>
    <nav class="navbar"><div class="container nav-inner">
        <a href="/" class="brand">📅 <span>HabitTracker</span></a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" rel="noopener" class="kofi-link">☕ Support</a>
            <a href="https://quickutils.top" target="_blank" rel="noopener">QuickUtils</a>
        </div>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
    </div></nav>

    <main class="container">
        <div class="dashboard-header">
            <div>
                <h1>Daily Habits</h1>
                <p class="text-muted" id="currentDateStr">Today</p>
            </div>
            <button class="btn btn-primary" id="newHabitBtn">+ New Habit</button>
        </div>

        <div class="stats-row mb-4">
            <div class="stat-card">
                <div class="stat-val" id="totalHabits">0</div>
                <div class="stat-lbl">Active Habits</div>
            </div>
            <div class="stat-card">
                <div class="stat-val text-accent" id="perfectDays">0</div>
                <div class="stat-lbl">Perfect Days</div>
            </div>
            <div class="stat-card">
                <div class="stat-val text-primary" id="bestStreak">0</div>
                <div class="stat-lbl">Best Streak</div>
            </div>
        </div>

        
        <div class="stats-row mb-4" id="milestonesRow" style="display:none; justify-content:flex-start; gap:10px; overflow-x:auto; padding-bottom:5px;">
            <!-- Rendered by JS -->
        </div>

        <div class="habits-container" id="habitsList">
            <!-- Rendered by JS -->
        </div>

        <div class="glass-card heatmap-card mt-4">
            <div class="flex-bw">
                <h3>Activity Heatmap</h3>
                <div class="heatmap-legend">
                    Less <span class="h-box l0"></span><span class="h-box l1"></span><span class="h-box l2"></span><span class="h-box l3"></span><span class="h-box l4"></span> More
                </div>
            </div>
            <div class="heatmap-scroll">
                <div class="heatmap-grid" id="heatmapGrid"></div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="habitModal">
        <div class="glass-card modal-content" style="max-width: 400px; width: 90%;">
            <div class="modal-header">
                <h2>Create Habit</h2>
                <button class="icon-btn" id="closeModal">❌</button>
            </div>
            <form id="habitForm">
                <div class="form-group">
                    <label>Habit Name</label>
                    <input type="text" id="habitName" placeholder="e.g. Read 10 pages" required autofocus>
                </div>
                
                <div class="form-group">
                    <label>Category</label>
                    <select id="habitCategory" required>
                        <option value="Health">Health 🍎</option>
                        <option value="Productivity">Productivity 💼</option>
                        <option value="Learning">Learning 📚</option>
                        <option value="Mindfulness">Mindfulness 🧘</option>
                        <option value="Other">Other ✨</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker" id="colorPicker">
                        <div class="color-opt active" data-color="#3b82f6" style="background:#3b82f6"></div>
                        <div class="color-opt" data-color="#10b981" style="background:#10b981"></div>
                        <div class="color-opt" data-color="#8b5cf6" style="background:#8b5cf6"></div>
                        <div class="color-opt" data-color="#f43f5e" style="background:#f43f5e"></div>
                        <div class="color-opt" data-color="#f59e0b" style="background:#f59e0b"></div>
                        <div class="color-opt" data-color="#06b6d4" style="background:#06b6d4"></div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">Add Habit</button>
            </form>
        </div>
    </div>

    <footer class="footer"><div class="container footer-inner">
        <div class="footer-brand"><span>📅 Habit Tracker</span><p>Part of <a href="https://quickutils.top">QuickUtils</a></p></div>
        <div class="footer-links-grid">
            <a href="https://budget.quickutils.top">Budget Tracker</a>
            <a href="https://focus.quickutils.top">Focus Timer</a>
        </div>
        <p class="copyright">© 2026 QuickUtils.</p>
    </div></footer>

    <script src="script.js"></script>
    <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script>kofiWidgetOverlay.draw('dayatin',{'type':'floating-chat','floating-chat.donateButton.text':'Support Us','floating-chat.donateButton.background-color':'#ff5e5b','floating-chat.donateButton.text-color':'#fff'});</script>
</body>
</html>
